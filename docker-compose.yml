services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: localdb
      POSTGRES_USER: nakama
    volumes:
      - nakama_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakama"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama:
    image: heroiclabs/nakama:3.22.0
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ecx
      - >
        /nakama/nakama migrate up --database.address nakama:localdb@postgres:5432/nakama &&
        exec /nakama/nakama
        --database.address nakama:localdb@postgres:5432/nakama
        --runtime.path /nakama/data/modules
        --runtime.js_entrypoint main.js
        --socket.server_key defaultkey
        --logger.level INFO
        --session.token_expiry_sec 7200
        --console.username admin
        --console.password password
    ports:
      - "7350:7350"
      - "7351:7351"
    volumes:
      - ./server/build:/nakama/data/modules

volumes:
  nakama_data:
